# Purpose: Test Optedge across supported Python versions and enforce linting.
name: Optedge CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: optedge-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Verify installed CLI outside the checkout
        working-directory: /tmp
        run: optedge --help

      - name: Run tests
        run: python -m pytest

  windows-first-run:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install through the public Windows setup
        shell: cmd
        run: |
          set OPTEDGE_NO_PAUSE=1
          call install.bat

      - name: Install test tools
        shell: pwsh
        run: .\venv\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Verify Windows launcher and tests
        shell: pwsh
        run: |
          .\run.bat --help
          .\venv\Scripts\python.exe -m pytest

      - name: Run the exact offline first-look flow
        shell: pwsh
        run: |
          $demo = Join-Path $env:RUNNER_TEMP "optedge-demo"
          .\run.bat --demo --no-open --out-dir $demo
          $dashboard = Get-ChildItem -LiteralPath $demo -Filter "dashboard_*.html"
          if (-not $dashboard) { throw "Offline demo did not create a dashboard" }

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Ruff
        run: python -m pip install "ruff>=0.6"

      - name: Lint
        run: ruff check . --select E9,F63,F7,F82,F401,F841,B033,B007,F541
